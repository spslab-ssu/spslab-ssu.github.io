# ============================================================
#  논문 목록 (Publications)
# ============================================================
#  이 파일만 고치면 Publications 페이지와 상단의 개수(숫자)가
#  자동으로 만들어집니다. HTML 을 직접 건드릴 필요가 없습니다.
#
#  ── 저자 표기 방법 ──
#   • 일반 저자        : 이름만 적습니다.            예)  - Y. Shin
#   • 우리 연구실(굵게) : me: true 를 붙입니다.        예)  - { name: Y. Lee, me: true }
#   • 교신저자(* 표시)  : corr: true 를 붙입니다.      예)  - { name: Y. Lee, me: true, corr: true }
#
#  ── 작성 규칙 ──
#   • 최신 논문일수록 각 목록의 맨 위에 넣습니다.
#   • 제목/저널명/도시 등에 콜론( : )이나 특수문자가 있으면 따옴표로 감싸세요.
#   • venue = 저널명 또는 학회명, detail = 권(호), 페이지, 월. 연도 (또는 도시, 월. 연도)
#   • doi 는 "10." 으로 시작하는 번호만 적으면 링크가 자동으로 만들어집니다. 없으면 그 줄을 지웁니다.
# ============================================================


