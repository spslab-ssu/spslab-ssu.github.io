<!--
  논문(Publications) 추가용 템플릿 모음입니다.
  pubs/index.md 파일을 직접 편집해서, 아래 블록 중 맞는 것을 복사해
  해당 섹션의 <ol class="pubs"> ... </ol> 안에 붙여넣으세요.

  ★ 매우 중요 ★
  논문을 추가/삭제하면 pubs/index.md 맨 위 <nav class="jump-nav"> 안의
  개수(<span class="jump_count">숫자</span>)도 반드시 같이 고쳐야 합니다.
  예) International 논문을 1편 추가했으면 10 → 11 로 수정.

  공통 표기 규칙
  - <span class="me">...</span> : 우리 연구실(교수님/연구원) 저자를 감싸 강조합니다.
  - <sup>*</sup> : 교신저자(corresponding author) 표시.
  - <span class="venue">...</span> : 저널명 또는 학회명 (자동으로 기울임 표시됨).
  - 저자 구분은 쉼표(,), 메타정보 구분은 가운뎃점(·) 을 사용합니다.
-->


<!-- ========== 1) 국제/국내 저널 논문 (International / Domestic Publications) ========== -->
<!-- 해당 섹션의 <ol class="pubs"> 안, 보통 맨 위(최신순)에 넣습니다. -->
<li><div>
  <div class="pub_title">논문 제목</div>
  <div class="pub_meta">First Author, <span class="me">Y. Lee<sup>*</sup></span>, Third Author · <span class="venue">저널명</span> 권(호), 페이지, Mon. 연도</div>
  <a class="pub_link" href="https://doi.org/10.xxxx/xxxxx">on-line link <i class="fas fa-up-right-from-square"></i></a>
</div></li>

<!-- DOI 링크가 아직 없으면 마지막 <a class="pub_link"> 줄을 지우세요. -->


<!-- ========== 2) 진행 중인 연구 (Works in Progress) ========== -->
<!-- (2-a) 게재 확정: accepted -->
<li><div>
  <div class="pub_title">논문 제목</div>
  <div class="pub_meta"><span class="pub_tag">accepted</span></div>
</div></li>

<!-- (2-b) 심사 중: under review -->
<li><div>
  <div class="pub_title">논문 제목</div>
  <div class="pub_meta"><span class="pub_tag is-review">under review</span></div>
</div></li>

<!-- (2-c) 상태 표시 없이 제목만 나열할 때: <div class="pub_meta"> 줄을 통째로 지웁니다. -->
<li><div>
  <div class="pub_title">논문 제목</div>
</div></li>


<!-- ========== 3) 학술대회 발표 (International / Domestic Conferences) ========== -->
<!-- 저널과 형식이 다릅니다. 한 줄짜리 pub_conf 구조를 사용하세요. -->
<li><div class="pub_conf"><span class="ptitle">발표 제목</span> · First Author, <span class="me">Y. Lee</span>, Third Author · <span class="venue">학회명 (YEAR)</span>, 도시, Mon. 연도</div></li>

<!-- 국내 학회는 저자/제목을 한글로 적습니다. 예:
<li><div class="pub_conf"><span class="ptitle">발표 제목</span> · 저자1, 저자2, <span class="me">이연수</span> · <span class="venue">대한산업공학회 춘계학술대회 (KIIE 2026)</span>, 도시, Mon. 연도</div></li>
-->
